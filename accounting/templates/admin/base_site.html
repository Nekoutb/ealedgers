{% extends "admin/base.html" %}

{% block title %}{{ title }} · EA Ledgers · Elite Advisors{% endblock %}

{% block branding %}
<h1 id="site-name">
  <a href="{% url 'admin:index' %}" style="display:inline-flex;align-items:center;gap:12px;text-decoration:none;color:inherit;">
    <svg viewBox="0 0 60 44" width="22" fill="currentColor" aria-hidden="true" style="vertical-align:middle;flex:none;">
      <rect width="56" height="8"/>
      <rect y="18" width="36" height="8"/>
      <rect y="36" width="56" height="8"/>
    </svg>
    <span style="font-weight:500;letter-spacing:0.16em;text-transform:uppercase;font-size:14px;">Elite Advisors</span>
    <span style="font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:16px;text-transform:none;letter-spacing:0;opacity:0.7;">EA Ledgers</span>
  </a>
</h1>
{% endblock %}

{% block nav-global %}{% endblock %}

{% block extrahead %}
{{ block.super }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,300..500&family=Public+Sans:wght@300..600&display=swap" rel="stylesheet">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 44' fill='%23000'%3E%3Crect width='56' height='8'/%3E%3Crect y='18' width='36' height='8'/%3E%3Crect y='36' width='56' height='8'/%3E%3C/svg%3E">

<style>
/* ============================================================
   Black & White admin theme — overrides Django's CSS variables
   ============================================================ */
:root,
html[data-theme="light"],
html[data-theme="auto"],
html[data-theme="dark"] {
  color-scheme: light;

  --primary: #000;
  --secondary: #000;
  --accent: #000;

  --primary-fg: #fff;
  --body-fg: #000;
  --body-bg: #fff;
  --body-quiet-color: #6b6b6b;
  --body-loud-color: #000;

  --header-color: #fff;
  --header-branding-color: #fff;
  --header-bg: #000;
  --header-link-color: #fff;

  --breadcrumbs-fg: #6b6b6b;
  --breadcrumbs-link-fg: #000;
  --breadcrumbs-bg: #fff;

  --link-fg: #000;
  --link-hover-color: #6b6b6b;
  --link-selected-fg: #000;

  --hairline-color: #e4e4e4;
  --border-color: #d0d0d0;

  --error-fg: #000;

  --message-success-bg: #f4f4f4;
  --message-warning-bg: #f4f4f4;
  --message-error-bg: #fff;

  --darkened-bg: #fafafa;
  --selected-bg: #f4f4f4;
  --selected-row: #f8f8f8;

  --button-fg: #fff;
  --button-bg: #000;
  --button-hover-bg: #2a2a2a;
  --default-button-bg: #000;
  --default-button-hover-bg: #2a2a2a;
  --close-button-bg: #fff;
  --close-button-hover-bg: #f0f0f0;
  --delete-button-bg: #000;
  --delete-button-hover-bg: #2a2a2a;

  --object-tools-fg: #fff;
  --object-tools-bg: #000;
  --object-tools-hover-bg: #2a2a2a;

  --font-family-primary: 'Public Sans', system-ui, -apple-system, sans-serif;
  --font-family-monospace: 'JetBrains Mono', ui-monospace, monospace;
}

@media (prefers-color-scheme: dark) {
  :root, html[data-theme="auto"], html[data-theme="dark"] {
    color-scheme: light;
    --body-bg: #fff;
    --body-fg: #000;
    --darkened-bg: #fafafa;
    --selected-bg: #f4f4f4;
    --selected-row: #f8f8f8;
    --primary: #000;
    --header-bg: #000;
    --header-color: #fff;
    --link-fg: #000;
    --breadcrumbs-bg: #fff;
    --breadcrumbs-fg: #6b6b6b;
    --breadcrumbs-link-fg: #000;
  }
}

/* ---- Global ---- */
body {
  font-family: 'Public Sans', system-ui, sans-serif;
  background: #fff;
  color: #000;
}
a, a:link { color: #000; }
a:hover { color: #555; }

/* ---- Header ---- */
#header {
  background: #000;
  color: #fff;
  border-bottom: none;
  padding: 14px 40px;
}
#header a:link, #header a:visited { color: #fff; }
#user-tools { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500; }
#user-tools a { border-bottom: 1px solid transparent; }
#user-tools a:focus, #user-tools a:hover { border-bottom-color: #fff; color: #fff; }

#site-name { font-size: inherit; }
#site-name a { color: #fff; }

/* ---- Breadcrumbs ---- */
div.breadcrumbs {
  background: #fff;
  color: #6b6b6b;
  padding: 14px 40px;
  border-bottom: 1px solid #000;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 500;
}
div.breadcrumbs a { color: #000; }
div.breadcrumbs a:hover { color: #6b6b6b; }

/* ---- Content area padding ---- */
#content { padding: 28px 40px; }
@media (max-width: 768px) { #content { padding: 18px 16px; } }

/* ---- Headings ---- */
h1, h2, h3, h4, h5 {
  font-family: 'Fraunces', 'Times New Roman', serif;
  font-weight: 400;
  letter-spacing: -0.01em;
  font-variation-settings: 'opsz' 144;
}
#content h1 { font-size: 32px; margin-bottom: 16px; }
.module h2, .module caption, .inline-group h2 {
  background: #000;
  color: #fff;
  font-family: 'Public Sans', sans-serif;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 500;
  padding: 12px 14px;
}

/* ---- Tables ---- */
table {
  border: 1px solid #000;
  border-collapse: collapse;
  width: 100%;
}
table thead th, thead th {
  background: #fff;
  color: #000;
  border-bottom: 1px solid #000;
  font-family: 'Public Sans', sans-serif;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 12px 10px;
}
table tbody td, table tbody th {
  border-bottom: 1px solid #e4e4e4;
  padding: 10px 10px;
}
table tr:hover td { background: #f8f8f8; }
.row1 { background: #fff; }
.row2 { background: #fafafa; }

/* ---- Buttons ---- */
.button, input[type=submit], input[type=button],
.submit-row input, a.button, .button.default {
  background: #000;
  color: #fff;
  border: 1px solid #000;
  border-radius: 0;
  padding: 10px 18px;
  font-family: 'Public Sans', sans-serif;
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.18s ease, color 0.18s ease;
}
.button:hover, input[type=submit]:hover, input[type=button]:hover,
.submit-row input:hover, a.button:hover, .button.default:hover {
  background: #fff;
  color: #000;
}
.submit-row {
  background: #fafafa;
  border-top: 1px solid #000;
  padding: 16px;
}
.submit-row input.deletelink, .deletelink {
  background: #fff;
  color: #000;
  border: 1px solid #000;
}
.submit-row input.deletelink:hover, .deletelink:hover {
  background: #000;
  color: #fff;
}

/* ---- Object tools (top-right "Add" buttons) ---- */
.object-tools { float: right; }
.object-tools a {
  background: #000 !important;
  color: #fff !important;
  border: 1px solid #000;
  border-radius: 0 !important;
  padding: 8px 16px !important;
  font-size: 10px !important;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 500;
}
.object-tools a:hover {
  background: #fff !important;
  color: #000 !important;
}
.object-tools a.addlink::before { color: inherit; }

/* ---- Inputs ---- */
input[type=text], input[type=email], input[type=password], input[type=number],
input[type=url], input[type=search], input[type=tel], input[type=date],
input[type=datetime-local], input[type=time], textarea, select {
  border: 1px solid #000;
  border-radius: 0;
  padding: 10px 12px;
  font-family: 'Public Sans', sans-serif;
  font-size: 14px;
  background: #fff;
  color: #000;
}
input[type=text]:focus, input[type=email]:focus, input[type=password]:focus,
input[type=number]:focus, input[type=url]:focus, input[type=search]:focus,
textarea:focus, select:focus {
  outline: none;
  box-shadow: inset 0 0 0 1px #000;
  border-color: #000;
}
textarea { resize: vertical; }
fieldset.module {
  border: 1px solid #000;
  border-radius: 0;
  margin-bottom: 24px;
}

/* ---- Form rows / fieldsets ---- */
.form-row { padding: 14px 16px; border-bottom: 1px solid #e4e4e4; }
.form-row:last-child { border-bottom: none; }
.form-row label { font-weight: 500; font-size: 12px; letter-spacing: 0.06em; }

/* ---- Selected row highlight ---- */
tr.selected td, tr.selected th { background: #f0f0f0; }

/* ---- Messages (success/warning/error banners) ---- */
ul.messagelist { padding: 0; margin: 0 0 20px; }
ul.messagelist li {
  border: 1px solid #000;
  padding: 12px 16px;
  font-size: 13px;
  background: #fff;
  color: #000;
  list-style: none;
}
ul.messagelist li.success { border-left: 4px solid #000; }
ul.messagelist li.warning, ul.messagelist li.error {
  border-left: 4px solid #000;
  background: #fafafa;
}

/* ---- Pagination ---- */
.paginator { padding: 16px 0; border-top: 1px solid #000; font-size: 12px; }
.paginator a, .paginator .this-page {
  border: 1px solid #000;
  padding: 6px 12px;
  margin: 0 2px;
  text-decoration: none;
  background: #fff;
  color: #000;
}
.paginator .this-page { background: #000; color: #fff; }
.paginator a:hover { background: #000; color: #fff; }

/* ---- Filter sidebar ---- */
#changelist-filter {
  background: #fff;
  border-left: 1px solid #000;
}
#changelist-filter h2 {
  background: #000;
  color: #fff;
  padding: 12px 16px;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 500;
}
#changelist-filter h3 {
  font-family: 'Public Sans', sans-serif;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #000;
  padding: 12px 16px 6px;
}
#changelist-filter li.selected { border-left: 3px solid #000; }
#changelist-filter li.selected a { color: #000; font-weight: 600; }
#changelist-filter li a { color: #6b6b6b; }
#changelist-filter li a:hover { color: #000; }

/* ---- Search bar ---- */
#changelist-search input[type=submit] {
  background: #000; color: #fff; border: 1px solid #000;
  border-radius: 0;
}

/* ---- Help text ---- */
.help, p.help, form p.help, div.help { color: #6b6b6b; font-size: 12px; font-style: normal; }

/* ---- Login page (admin's built-in fallback — though we redirect to /) ---- */
.login #container {
  background: #fff;
  border: 1px solid #000;
  box-shadow: none;
}
.login #header { padding: 24px; }

/* ---- Footer / branding ---- */
#footer { background: #fff; color: #6b6b6b; padding: 16px 40px; border-top: 1px solid #000; }
</style>
{% endblock %}
